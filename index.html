<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HustleBoard ZA — Local Gig Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #007A4D;
  --green-light: #00B871;
  --gold: #FFB612;
  --gold-dark: #E5A00D;
  --black: #0A0A0A;
  --bg: #0F1114;
  --card-bg: #1A1D23;
  --card-border: #2A2D35;
  --surface: #15171C;
  --text: #E8E8EC;
  --text-muted: #8B8D97;
  --danger: #E54545;
  --radius: 14px;
  --glow-green: 0 0 25px rgba(0,122,77,0.3), 0 0 50px rgba(0,122,77,0.1);
  --glow-gold: 0 0 25px rgba(255,182,18,0.25), 0 0 50px rgba(255,182,18,0.08);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* === NAVBAR === */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,17,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 1rem;
}
.navbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--green), var(--green-light));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #fff;
}
.logo-text { font-weight: 900; font-size: 1.35rem; color: var(--text); }
.logo-text span { color: var(--gold); }

/* === AUTH & DASHBOARD === */
.nav-auth {
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn-login {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}
.btn-post {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #000; border: none; padding: 10px 22px; border-radius: 10px;
  font-weight: 700; cursor: pointer;
}
.user-profile {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 4px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
.user-avatar {
  width: 28px;
  height: 28px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.8rem;
  color: #fff;
}

/* === HERO === */
.hero { text-align: center; padding: 3.5rem 1rem 1rem; max-width: 700px; margin: 0 auto; }
.hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; margin-bottom: 0.75rem; letter-spacing: -1px; }
.hero h1 span { color: var(--green-light); }

/* === GIG CARD === */
.gig-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
  max-width: 1280px;
  margin: 2rem auto;
  padding: 0 1rem 4rem;
}
.gig-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  transition: all 0.3s ease;
  overflow: hidden;
}
.gig-card:hover { transform: translateY(-3px); border-color: var(--green-light); }
.gig-card.featured-glow {
  border-color: var(--gold);
  box-shadow: var(--glow-gold);
}
.gig-card.featured-glow::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gold);
}

.card-type-tag {
  font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px; display: inline-block; width: max-content;
}
.type-offer { background: rgba(0,122,77,0.15); color: var(--green-light); }
.type-request { background: rgba(255,182,18,0.15); color: var(--gold); }

.card-title { font-size: 1.15rem; font-weight: 800; flex: 1; }
.card-price {
  background: var(--green); color: #fff;
  padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 0.9rem;
}
.request-price { background: var(--gold); color: #000; }

.badge {
  font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.05); color: var(--text-muted);
  display: inline-flex; align-items: center; gap: 4px;
}
.badge-featured { color: var(--gold); border: 1px solid var(--gold); }
.badge-verified { color: #4facfe; border: 1px solid #4facfe; }

.btn-wa {
  background: #25D366; color: #fff; border: none; padding: 12px;
  border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-wa:hover { background: #20BD5A; }

.btn-delete {
  position: absolute; top: 15px; right: 15px; width: 28px; height: 28px;
  background: rgba(229,69,69,0.1); color: var(--danger); border: none;
  border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.status-badge {
  font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
}
.status-completed { background: rgba(0,184,113,0.15); color: var(--green-light); border: 1px solid var(--green); }
.status-pending-confirmation { background: rgba(255,182,18,0.15); color: var(--gold); border: 1px solid var(--gold); }

.btn-confirm-finish {
  background: var(--gold); color: #000; border: none; padding: 10px;
  border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; width: 100%; margin: 10px 0;
}

/* === MODALS === */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
  z-index: 200; align-items: center; justify-content: center; padding: 1rem;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 18px; width: 100%; max-width: 500px; padding: 2rem;
  max-height: 90vh; overflow-y: auto;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }

/* === TOAST === */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff; padding: 12px 24px;
  border-radius: 10px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: var(--text-muted); font-weight: 600; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px; background: var(--surface);
  border: 1px solid var(--card-border); border-radius: 10px; color: var(--text);
  font-family: inherit; outline: none;
}
.form-input:focus { border-color: var(--green-light); }

.dashboard-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem; background: var(--surface); border: 1px solid var(--card-border);
  border-radius: 12px; margin-bottom: 10px;
}
.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: #333; transition: .4s; border-radius: 24px;
}
.slider:before {
  position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
  background-color: white; transition: .4s; border-radius: 50%;
}
input:checked + .slider { background-color: var(--green); }
input:checked + .slider:before { transform: translateX(20px); }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="#" class="logo" onclick="location.reload()">
      <div class="logo-icon">H</div>
      <div class="logo-text">HustleBoard <span>ZA</span></div>
    </a>
    <div class="nav-auth" id="navAuth">
      <button class="btn-login" onclick="openModal('authModal')">Login / Join</button>
      <button class="btn-post" onclick="checkAuthAndPost()">+ Post</button>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Find <span>local gigs</span> or post your hustle</h1>
  <p>South Africa's community gig board. Direct WhatsApp connections. No middleman.</p>
</section>

<div class="gig-grid" id="gigGrid"></div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-header">
      <h2 id="authTitle">Welcome Back</h2>
      <button class="modal-close" onclick="closeModal('authModal')">✕</button>
    </div>
    <div style="display: flex; gap: 20px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--card-border);">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">Login</div>
      <div class="auth-tab" id="tabRegister" onclick="switchAuth('register')">Register</div>
    </div>
    <form id="authForm" onsubmit="handleAuth(event)">
      <div class="form-group" id="nameGroup" style="display: none;">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="authName" placeholder="e.g. Sipho Khumalo">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="authEmail" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="authPass" required>
      </div>
      <button type="submit" class="btn-post" style="width: 100%; margin-top: 10px;" id="authSubmitBtn">Login</button>
    </form>
  </div>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Post a Hustle</h2>
      <button class="modal-close" onclick="closeModal('postModal')">✕</button>
    </div>
    <form onsubmit="handlePost(event)">
      <div class="form-group">
        <label class="form-label">I want to...</label>
        <select class="form-select" id="postType" required>
          <option value="offer">🙋 Offer a service</option>
          <option value="request">🔍 Find help</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="postTitle" placeholder="e.g. Reliable Plumber available" required maxlength="60">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="postCat" required>
          <option value="Garden">🌿 Garden</option>
          <option value="Cleaning">🧹 Cleaning</option>
          <option value="Tech">💻 Tech</option>
          <option value="Design">🎨 Design</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Price (Rands)</label>
        <input type="number" class="form-input" id="postPrice" required min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" class="form-input" id="postLoc" placeholder="e.g. Joburg" required>
      </div>
      <div class="form-group">
        <label class="form-label">WhatsApp Number</label>
        <input type="tel" class="form-input" id="postWhatsapp" placeholder="082..." required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="postDesc" required maxlength="300"></textarea>
      </div>
      <button type="submit" class="btn-post" style="width: 100%;">🚀 Post Now</button>
    </form>
  </div>
</div>

<!-- DASHBOARD MODAL -->
<div class="modal-overlay" id="dashboardModal">
  <div class="modal" style="max-width: 600px;">
    <div class="modal-header">
      <h2>My Hustles</h2>
      <button class="modal-close" onclick="closeModal('dashboardModal')">✕</button>
    </div>
    <div id="userGigsList"></div>
    <div style="margin-top: 2rem; border-top: 1px solid var(--card-border); padding-top: 1rem;">
       <button class="btn-login" onclick="logout()" style="width: 100%; border-color: var(--danger); color: var(--danger);">Logout</button>
    </div>
  </div>
</div>

<!-- AI ASSISTANT MODAL -->
<div class="modal-overlay" id="aiModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🤖 AI Assistant</h2>
      <button class="modal-close" onclick="closeModal('aiModal')">✕</button>
    </div>
    <div id="aiPitch" style="background: var(--surface); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; line-height: 1.6; border: 1px solid var(--card-border);"></div>
    <button class="btn-wa" id="sendAiBtn">🚀 Send to WhatsApp</button>
  </div>
</div>

<!-- PAY MODAL -->
<div class="modal-overlay" id="payModal">
  <div class="modal" style="text-align: center;">
    <h2 style="color: var(--gold); margin-bottom: 1rem;">✨ Boost Your Post</h2>
    <p style="margin-bottom: 2rem; color: var(--text-muted);">Get 10x more views by pinning this to the top for R50.</p>
    <div style="background: #fff; padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem;">
      <img src="https://paystack.com/assets/payment/paystack-logo.png" style="height: 20px;">
    </div>
    <button class="btn-post" onclick="simulatePayment()" style="width: 100%; background: #3bb3e0; color: #fff;">Pay with Paystack</button>
    <button class="btn-login" onclick="closeModal('payModal')" style="width: 100%; margin-top: 10px; border: none;">Maybe later</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG & DATA =====
const API_URL = 'http://localhost:5000/api';
const STORAGE_KEY = 'hustleboard_gigs';
const USER_KEY = 'hustleboard_user';
const USERS_DB_KEY = 'hustleboard_users_db';

const catEmoji = { 'Garden': '🌿', 'Cleaning': '🧹', 'Tech': '💻', 'Design': '🎨', 'Other': '📦' };

let currentUser = JSON.parse(localStorage.getItem(USER_KEY)) || null;
let authMode = 'login';

// ===== DATA LAYER =====
async function getGigs() {
  try {
    // Try backend but with a short timeout to prevent long delays
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), 2000);
    const res = await fetch(`${API_URL}/gigs`, { signal: controller.signal });
    clearTimeout(id);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch (e) {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }
}

function saveAllGigs(gigs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(gigs));
  // Future: Sync to backend via PUT /api/gigs
}

// ===== AUTH =====
function updateNavbar() {
  const navAuth = document.getElementById('navAuth');
  if (currentUser) {
    navAuth.innerHTML = `
      <div class="user-profile" onclick="openDashboard()">
        <div class="user-avatar">${currentUser.name[0].toUpperCase()}</div>
        <div style="font-weight: 700; font-size: 0.9rem;">${currentUser.name.split(' ')[0]}</div>
      </div>
      <button class="btn-post" onclick="openModal('postModal')">+ Post</button>
    `;
  } else {
    navAuth.innerHTML = `
      <button class="btn-login" onclick="openModal('authModal')">Login / Join</button>
      <button class="btn-post" onclick="checkAuthAndPost()">+ Post</button>
    `;
  }
}

function switchAuth(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('authTitle').textContent = mode === 'login' ? 'Welcome Back' : 'Create Account';
  document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Login' : 'Join HustleBoard';
  document.getElementById('nameGroup').style.display = mode === 'login' ? 'none' : 'block';
}

function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value;
  const pass = document.getElementById('authPass').value;
  const name = document.getElementById('authName').value;
  const users = JSON.parse(localStorage.getItem(USERS_DB_KEY)) || [];

  if (authMode === 'register') {
    if (users.find(u => u.email === email)) return showToast("Email already exists!", true);
    const newUser = { id: 'u' + Date.now(), name, email, pass };
    users.push(newUser);
    localStorage.setItem(USERS_DB_KEY, JSON.stringify(users));
    loginUser(newUser);
  } else {
    const user = users.find(u => u.email === email && u.pass === pass);
    if (!user) return showToast("Invalid email or password", true);
    loginUser(user);
  }
}

function loginUser(user) {
  currentUser = user;
  localStorage.setItem(USER_KEY, JSON.stringify(user));
  closeModal('authModal');
  updateNavbar();
  renderGigs();
  showToast(`Welcome back, ${user.name.split(' ')[0]}!`);
}

function logout() {
  currentUser = null;
  localStorage.removeItem(USER_KEY);
  closeModal('dashboardModal');
  updateNavbar();
  renderGigs();
  showToast("Logged out");
}

function checkAuthAndPost() {
  if (!currentUser) { openModal('authModal'); showToast("Please login to post", true); }
  else openModal('postModal');
}

// ===== RENDER & ACTIONS =====
async function renderGigs() {
  const grid = document.getElementById('gigGrid');
  if (!grid) return;

  const gigs = await getGigs();
  gigs.sort((a,b) => (b.isFeatured - a.isFeatured) || (b.createdAt - a.createdAt));

  const activeGigs = gigs.filter(g => g.status !== 'Archived');

  if (activeGigs.length === 0) {
    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem;"><h3>No active hustles found.</h3><p>Be the first to post!</p></div>`;
    return;
  }

  grid.innerHTML = activeGigs.map(g => {
    const isOwner = currentUser && g.ownerId === currentUser.id;
    const isPending = g.status === 'Pending Confirmation';
    
    return `
      <div class="gig-card ${g.isFeatured ? 'featured-glow' : ''}">
        ${isOwner ? `<button class="btn-delete" onclick="confirmDelete('${g.id}')">✕</button>` : ''}
        <div style="display: flex; gap: 8px; align-items: center;">
          <div class="card-type-tag ${g.type === 'offer' ? 'type-offer' : 'type-request'}">
            ${g.type === 'offer' ? 'Service Offered' : 'Help Wanted'}
          </div>
          ${isPending ? '<span class="status-badge status-pending-confirmation">Waiting for confirmation... ⏳</span>' : ''}
        </div>
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h3 class="card-title">${escapeHtml(g.title)} ${g.isVerified ? '🛡️' : ''}</h3>
          <span class="card-price ${g.type === 'request' ? 'request-price' : ''}">R${g.price}</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">${escapeHtml(g.description)}</p>
        <div style="display: flex; gap: 8px; margin: 5px 0;">
          <span class="badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${escapeHtml(g.location)}</span>
          <span class="badge">${catEmoji[g.category] || '📦'} ${g.category}</span>
          ${g.isFeatured ? '<span class="badge badge-featured">✨ FEATURED</span>' : ''}
        </div>
        ${(isPending && !isOwner) ? `<button class="btn-confirm-finish" onclick="confirmUserFinish('${g.id}')">✅ Confirm this job is done</button>` : ''}
        <div style="display: flex; gap: 10px; margin-top: auto;">
          <button class="btn-wa" onclick="openAi('${g.id}')">Contact</button>
          ${isOwner ? `<button class="btn-post" onclick="openDashboard()" style="padding: 8px 12px; font-size: 0.8rem; background: var(--surface); color: var(--text);">Manage</button>` : `<button class="btn-post" onclick="openModal('payModal')" style="padding: 8px 12px; font-size: 0.8rem;">Boost</button>`}
        </div>
      </div>
    `;
  }).join('');
}

async function handlePost(e) {
  e.preventDefault();
  const gig = {
    id: 'g' + Date.now(),
    ownerId: currentUser.id,
    title: document.getElementById('postTitle').value,
    type: document.getElementById('postType').value,
    category: document.getElementById('postCat').value,
    price: document.getElementById('postPrice').value,
    location: document.getElementById('postLoc').value,
    whatsapp: document.getElementById('postWhatsapp').value,
    description: document.getElementById('postDesc').value,
    status: 'Active',
    createdAt: Date.now()
  };
  
  const all = await getGigs();
  all.unshift(gig);
  saveAllGigs(all);
  closeModal('postModal');
  renderGigs();
  showToast("Hustle posted! 🎉");
}

async function openDashboard() {
  if (!currentUser) return;
  const gigs = await getGigs();
  const userGigs = gigs.filter(g => g.ownerId === currentUser.id);
  const list = document.getElementById('userGigsList');
  list.innerHTML = userGigs.length === 0 ? `<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No hustles posted yet.</p>` :
    userGigs.map(g => `
      <div class="dashboard-item">
        <div><div style="font-weight: 800;">${escapeHtml(g.title)}</div><div style="font-size: 0.8rem; color: var(--text-muted);">Status: ${g.status || 'Active'}</div></div>
        <div style="display: flex; align-items: center; gap: 15px;">
          <label class="switch"><input type="checkbox" ${g.status === 'Pending Confirmation' ? 'checked' : ''} onchange="toggleStatus('${g.id}', this.checked)"><span class="slider"></span></label>
          <button onclick="confirmDelete('${g.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;">✕</button>
        </div>
      </div>
    `).join('');
  openModal('dashboardModal');
}

async function toggleStatus(id, isFinished) {
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  if (g && g.ownerId === currentUser.id) {
    g.status = isFinished ? 'Pending Confirmation' : 'Active';
    saveAllGigs(gigs);
    renderGigs();
    showToast(`Hustle marked as ${isFinished ? 'Finished' : 'Active'}`);
  }
}

async function confirmUserFinish(id) {
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  if (g) { g.status = 'Archived'; saveAllGigs(gigs); renderGigs(); showToast("🎉 Job confirmed & removed!"); }
}

async function confirmDelete(id) {
  if (confirm("Remove this hustle permanently?")) {
    const gigs = await getGigs();
    saveAllGigs(gigs.filter(g => g.id != id));
    renderGigs();
    if(document.getElementById('dashboardModal').classList.contains('active')) openDashboard();
    showToast("Hustle removed ✓");
  }
}

// ===== UTILS =====
function openModal(id) { document.getElementById(id).classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('active'); document.body.style.overflow = ''; }

async function openAi(id) {
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  const pitch = g.type === 'offer' ? `Hi! I saw your service "${g.title}" on HustleBoard and I'm interested.` : `Hi! I saw your request for "${g.title}" and I'd love to help.`;
  document.getElementById('aiPitch').textContent = pitch;
  document.getElementById('sendAiBtn').onclick = () => window.open(`https://wa.me/${g.whatsapp}?text=${encodeURIComponent(pitch)}`);
  openModal('aiModal');
}

function simulatePayment() { showToast("Processing..."); setTimeout(() => { showToast("Success! Post boosted. 🎉"); closeModal('payModal'); }, 1500); }

function showToast(m, err = false) {
  const t = document.getElementById('toast'); t.textContent = m; t.style.background = err ? 'var(--danger)' : 'var(--green)';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

// ===== INIT =====
function seedData() {
  if (localStorage.getItem(STORAGE_KEY)) return;
  const samples = [
    { id: 's1', ownerId: 'sys', title: 'Garden Cleanup', category: 'Garden', location: 'Joburg', price: '450', whatsapp: '0821234567', description: 'Mowing and refuse removal.', type: 'offer', isFeatured: true, isVerified: true, status: 'Active', createdAt: Date.now() },
    { id: 's2', ownerId: 'sys', title: 'Need Plumber', category: 'Other', location: 'Pretoria', price: '800', whatsapp: '0831112222', description: 'Emergency pipe repair.', type: 'request', isFeatured: true, status: 'Active', createdAt: Date.now() - 100000 }
  ];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(samples));
}

seedData();
updateNavbar();
renderGigs();
</script>
