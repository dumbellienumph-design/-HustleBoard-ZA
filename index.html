<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HustleBoard ZA — Local Gig Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #007A4D;
  --green-light: #00B871;
  --gold: #FFB612;
  --gold-dark: #E5A00D;
  --black: #0A0A0A;
  --bg: #0F1114;
  --card-bg: #1A1D23;
  --card-border: #2A2D35;
  --surface: #15171C;
  --text: #E8E8EC;
  --text-muted: #8B8D97;
  --danger: #E54545;
  --radius: 14px;
  --glow-green: 0 0 25px rgba(0,122,77,0.3), 0 0 50px rgba(0,122,77,0.1);
  --glow-gold: 0 0 25px rgba(255,182,18,0.25), 0 0 50px rgba(255,182,18,0.08);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* === NAVBAR === */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,17,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 1rem;
}
.navbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--green), var(--green-light));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #fff;
}
.logo-text { font-weight: 900; font-size: 1.35rem; color: var(--text); }
.logo-text span { color: var(--gold); }

.btn-post {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #000; border: none; padding: 10px 22px; border-radius: 10px;
  font-weight: 700; cursor: pointer;
}

/* === HERO === */
.hero { text-align: center; padding: 3.5rem 1rem 1rem; max-width: 700px; margin: 0 auto; }
.hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; margin-bottom: 0.75rem; }
.hero h1 span { color: var(--green-light); }

/* === GIG CARD === */
.gig-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
  max-width: 1280px;
  margin: 2rem auto;
  padding: 0 1rem;
}
.gig-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  transition: transform 0.2s;
}
.gig-card.featured-glow {
  border-color: var(--gold);
  box-shadow: var(--glow-gold);
}
.card-type-tag {
  font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px; display: inline-block; width: max-content;
}
.type-offer { background: rgba(0,122,77,0.15); color: var(--green-light); }
.type-request { background: rgba(255,182,18,0.15); color: var(--gold); }

.card-title { font-size: 1.15rem; font-weight: 800; }
.card-price {
  background: var(--green); color: #fff;
  padding: 4px 12px; border-radius: 8px; font-weight: 800;
}
.request-price { background: var(--gold); color: #000; }

.badge {
  font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.05); color: var(--text-muted);
}
.badge-featured { color: var(--gold); border: 1px solid var(--gold); }
.badge-verified { color: #4facfe; border: 1px solid #4facfe; }

.btn-wa {
  background: #25D366; color: #fff; border: none; padding: 12px;
  border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%;
  margin-top: auto;
}

/* === MODALS === */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
  z-index: 200; align-items: center; justify-content: center; padding: 1rem;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 18px; width: 100%; max-width: 500px; padding: 2rem;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }

/* === TOAST === */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff; padding: 12px 24px;
  border-radius: 10px; font-weight: 600; opacity: 0; transition: 0.3s;
}
.toast.show { opacity: 1; }

.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: var(--text-muted); }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px; background: var(--surface);
  border: 1px solid var(--card-border); border-radius: 10px; color: var(--text);
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="#" class="logo">
      <div class="logo-icon">H</div>
      <div class="logo-text">HustleBoard <span>ZA</span></div>
    </a>
    <button class="btn-post" onclick="openModal('postModal')">+ Post a Gig</button>
  </div>
</nav>

<section class="hero">
  <h1>Find <span>local gigs</span> or post your hustle</h1>
  <p>Connect directly via WhatsApp. No middleman.</p>
</section>

<div class="gig-grid" id="gigGrid"></div>

<!-- POST MODAL -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Post a Gig</h2>
      <button class="modal-close" onclick="closeModal('postModal')">✕</button>
    </div>
    <form onsubmit="handlePost(event)">
      <div class="form-group">
        <label class="form-label">I want to...</label>
        <select class="form-select" id="postType" required>
          <option value="offer">Offer a service</option>
          <option value="request">Find help</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-input" id="postTitle" placeholder="e.g. Plumber available" required>
      </div>
      <div class="form-group">
        <label class="form-label">Price (Rands)</label>
        <input type="number" class="form-input" id="postPrice" required>
      </div>
      <div class="form-group">
        <label class="form-label">WhatsApp Number</label>
        <input type="tel" class="form-input" id="postWhatsapp" placeholder="082..." required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="postDesc" required></textarea>
      </div>
      <button type="submit" class="btn-post" style="width: 100%;">🚀 Post Now</button>
    </form>
  </div>
</div>

<!-- AI ASSISTANT MODAL -->
<div class="modal-overlay" id="aiModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🤖 AI Assistant</h2>
      <button class="modal-close" onclick="closeModal('aiModal')">✕</button>
    </div>
    <div id="aiPitch" style="background: var(--surface); padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; line-height: 1.5;"></div>
    <button class="btn-wa" id="sendAiBtn">🚀 Send to WhatsApp</button>
  </div>
</div>

<!-- PAYSTACK MODAL -->
<div class="modal-overlay" id="payModal">
  <div class="modal" style="text-align: center;">
    <h2 style="color: var(--gold); margin-bottom: 1rem;">✨ Boost Your Post</h2>
    <p style="margin-bottom: 2rem;">Get 10x more views by pinning this to the top for R50.</p>
    <button class="btn-post" onclick="simulatePayment()" style="width: 100%; background: #3bb3e0; color: #fff;">Pay with Paystack</button>
    <button class="btn-wa" onclick="closeModal('payModal')" style="background: none; color: var(--text-muted);">Maybe later</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'http://localhost:5000/api';
const STORAGE_KEY = 'hustleboard_gigs';

async function getGigs() {
  try {
    const res = await fetch(`${API_URL}/gigs`);
    return await res.json();
  } catch {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }
}

async function renderGigs() {
  const gigs = await getGigs();
  const grid = document.getElementById('gigGrid');
  
  // Sort: Featured first
  gigs.sort((a,b) => (b.isFeatured - a.isFeatured) || (b.createdAt - a.createdAt));

  grid.innerHTML = gigs.map(g => `
    <div class="gig-card ${g.isFeatured ? 'featured-glow' : ''}">
      <div class="card-type-tag ${g.type === 'offer' ? 'type-offer' : 'type-request'}">
        ${g.type === 'offer' ? 'Service Offered' : 'Help Wanted'}
      </div>
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h3 class="card-title">${g.title} ${g.isVerified ? '🛡️' : ''}</h3>
        <span class="card-price ${g.type === 'request' ? 'request-price' : ''}">R${g.price}</span>
      </div>
      <p style="color: var(--text-muted); font-size: 0.9rem;">${g.description}</p>
      <div style="display: flex; gap: 8px; margin: 10px 0;">
        ${g.isFeatured ? '<span class="badge badge-featured">FEATURED</span>' : ''}
        ${g.isVerified ? '<span class="badge badge-verified">Verified</span>' : ''}
      </div>
      <div style="display: flex; gap: 10px; margin-top: auto;">
        <button class="btn-wa" onclick="openAi('${g.id}')">Contact</button>
        <button class="btn-post" onclick="openModal('payModal')" style="padding: 8px 12px; font-size: 0.8rem;">Boost</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function handlePost(e) {
  e.preventDefault();
  const gig = {
    title: document.getElementById('postTitle').value,
    type: document.getElementById('postType').value,
    price: document.getElementById('postPrice').value,
    whatsapp: document.getElementById('postWhatsapp').value,
    description: document.getElementById('postDesc').value,
    createdAt: Date.now()
  };
  
  try {
    await fetch(`${API_URL}/gigs`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(gig)
    });
  } catch {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    local.unshift({...gig, id: Date.now()});
    localStorage.setItem(STORAGE_KEY, JSON.stringify(local));
  }
  
  closeModal('postModal');
  renderGigs();
  showToast("Post added! 🎉");
}

async function openAi(id) {
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  const pitch = g.type === 'offer' 
    ? `Hi! I saw your service "${g.title}" on HustleBoard and I'm interested.`
    : `Hi! I saw your request for "${g.title}" and I'd love to help.`;
    
  document.getElementById('aiPitch').textContent = pitch;
  document.getElementById('sendAiBtn').onclick = () => {
    window.open(`https://wa.me/${g.whatsapp}?text=${encodeURIComponent(pitch)}`);
  };
  openModal('aiModal');
}

function simulatePayment() {
  showToast("Processing...");
  setTimeout(() => {
    showToast("Success! Post boosted. 🎉");
    closeModal('payModal');
  }, 1500);
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

renderGigs();
</script>
</body>
</html>
