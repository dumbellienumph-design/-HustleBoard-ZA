<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HustleBoard ZA — Local Gig Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #007A4D;
  --green-light: #00B871;
  --gold: #FFB612;
  --gold-dark: #E5A00D;
  --black: #0A0A0A;
  --bg: #0F1114;
  --card-bg: #1A1D23;
  --card-border: #2A2D35;
  --surface: #15171C;
  --text: #E8E8EC;
  --text-muted: #8B8D97;
  --danger: #E54545;
  --radius: 14px;
  --glow-green: 0 0 25px rgba(0,122,77,0.3), 0 0 50px rgba(0,122,77,0.1);
  --glow-gold: 0 0 25px rgba(255,182,18,0.25), 0 0 50px rgba(255,182,18,0.08);
}

/* === AUTH & DASHBOARD === */
.nav-auth {
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn-login {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}
.user-profile {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 4px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
.user-avatar {
  width: 28px;
  height: 28px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.8rem;
  color: #fff;
}

.auth-tabs {
  display: flex;
  gap: 20px;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--card-border);
}
.auth-tab {
  padding: 10px 0;
  color: var(--text-muted);
  cursor: pointer;
  font-weight: 700;
  position: relative;
}
.auth-tab.active {
  color: var(--green-light);
}
.auth-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--green-light);
}

.btn-delete {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 32px;
  height: 32px;
  background: rgba(229,69,69,0.1);
  color: var(--danger);
  border: 1px solid rgba(229,69,69,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
}
.gig-card:hover .btn-delete { opacity: 1; }
.btn-delete:hover { background: var(--danger); color: #fff; }

.status-badge {
  font-size: 0.65rem;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.status-completed { background: rgba(0,184,113,0.15); color: var(--green-light); border: 1px solid var(--green); }
.status-pending-confirmation { background: rgba(255,182,18,0.15); color: var(--gold); border: 1px solid var(--gold); }

.btn-confirm-finish {
  background: var(--gold);
  color: #000;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}
.btn-confirm-finish:hover { background: var(--gold-dark); }

.dashboard-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem;
  background: var(--surface);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  margin-bottom: 10px;
}

/* Toggle Switch */
.switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #333;
  transition: .4s;
  border-radius: 24px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 18px; width: 18px;
  left: 3px; bottom: 3px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}
input:checked + .slider { background-color: var(--green); }
input:checked + .slider:before { transform: translateX(20px); }

</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="#" class="logo" onclick="location.reload()">
      <div class="logo-icon">H</div>
      <div class="logo-text">HustleBoard <span>ZA</span></div>
    </a>
    <div class="nav-auth" id="navAuth">
      <button class="btn-login" onclick="openModal('authModal')">Login / Join</button>
      <button class="btn-post" onclick="checkAuthAndPost()">+ Post</button>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Find <span>local gigs</span> or post your hustle</h1>
  <p>South Africa's community gig board. Build your reputation, connect on WhatsApp.</p>
</section>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-header">
      <h2 id="authTitle">Welcome Back</h2>
      <button class="modal-close" onclick="closeModal('authModal')">✕</button>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">Login</div>
      <div class="auth-tab" id="tabRegister" onclick="switchAuth('register')">Register</div>
    </div>
    <form id="authForm" onsubmit="handleAuth(event)">
      <div class="form-group" id="nameGroup" style="display: none;">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="authName" placeholder="e.g. Sipho Khumalo">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="authEmail" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="authPass" required>
      </div>
      <button type="submit" class="btn-post" style="width: 100%; margin-top: 10px;" id="authSubmitBtn">Login</button>
    </form>
  </div>
</div>

<!-- DASHBOARD MODAL -->
<div class="modal-overlay" id="dashboardModal">
  <div class="modal" style="max-width: 600px;">
    <div class="modal-header">
      <h2>My Hustles</h2>
      <button class="modal-close" onclick="closeModal('dashboardModal')">✕</button>
    </div>
    <div id="userGigsList">
      <!-- User's gigs show up here -->
    </div>
    <div style="margin-top: 2rem; border-top: 1px solid var(--card-border); padding-top: 1rem;">
       <button class="btn-filled" onclick="logout()" style="width: 100%; border-color: var(--danger); color: var(--danger);">Logout</button>
    </div>
  </div>
</div>

<!-- AI ASSISTANT MODAL -->
<div class="modal-overlay" id="aiModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🤖 AI Assistant</h2>
      <button class="modal-close" onclick="closeModal('aiModal')">✕</button>
    </div>
    <div id="aiPitch" style="background: var(--surface); padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; line-height: 1.5;"></div>
    <button class="btn-wa" id="sendAiBtn">🚀 Send to WhatsApp</button>
  </div>
</div>

<!-- PAYSTACK MODAL -->
<div class="modal-overlay" id="payModal">
  <div class="modal" style="text-align: center;">
    <h2 style="color: var(--gold); margin-bottom: 1rem;">✨ Boost Your Post</h2>
    <p style="margin-bottom: 2rem;">Get 10x more views by pinning this to the top for R50.</p>
    <button class="btn-post" onclick="simulatePayment()" style="width: 100%; background: #3bb3e0; color: #fff;">Pay with Paystack</button>
    <button class="btn-wa" onclick="closeModal('payModal')" style="background: none; color: var(--text-muted);">Maybe later</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'http://localhost:5000/api';
const STORAGE_KEY = 'hustleboard_gigs';
const USER_KEY = 'hustleboard_user';
const USERS_DB_KEY = 'hustleboard_users_db';

let currentUser = JSON.parse(localStorage.getItem(USER_KEY)) || null;
let authMode = 'login';

// ===== AUTH LOGIC =====
function updateNavbar() {
  const navAuth = document.getElementById('navAuth');
  if (currentUser) {
    navAuth.innerHTML = `
      <div class="user-profile" onclick="openDashboard()">
        <div class="user-avatar">${currentUser.name[0].toUpperCase()}</div>
        <div style="font-weight: 700; font-size: 0.9rem;">${currentUser.name.split(' ')[0]}</div>
      </div>
      <button class="btn-post" onclick="openModal('postModal')">+ Post</button>
    `;
  } else {
    navAuth.innerHTML = `
      <button class="btn-login" onclick="openModal('authModal')">Login / Join</button>
      <button class="btn-post" onclick="checkAuthAndPost()">+ Post</button>
    `;
  }
}

function switchAuth(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('authTitle').textContent = mode === 'login' ? 'Welcome Back' : 'Create Account';
  document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Login' : 'Join HustleBoard';
  document.getElementById('nameGroup').style.display = mode === 'login' ? 'none' : 'block';
}

function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value;
  const pass = document.getElementById('authPass').value;
  const name = document.getElementById('authName').value;
  
  const users = JSON.parse(localStorage.getItem(USERS_DB_KEY)) || [];

  if (authMode === 'register') {
    if (users.find(u => u.email === email)) return showToast("Email already exists!", true);
    const newUser = { id: 'u' + Date.now(), name, email, pass };
    users.push(newUser);
    localStorage.setItem(USERS_DB_KEY, JSON.stringify(users));
    loginUser(newUser);
  } else {
    const user = users.find(u => u.email === email && u.pass === pass);
    if (!user) return showToast("Invalid email or password", true);
    loginUser(user);
  }
}

function loginUser(user) {
  currentUser = user;
  localStorage.setItem(USER_KEY, JSON.stringify(user));
  closeModal('authModal');
  updateNavbar();
  renderGigs();
  showToast(`Welcome back, ${user.name.split(' ')[0]}!`);
}

function logout() {
  currentUser = null;
  localStorage.removeItem(USER_KEY);
  closeModal('dashboardModal');
  updateNavbar();
  renderGigs();
  showToast("Logged out successfully");
}

function checkAuthAndPost() {
  if (!currentUser) {
    openModal('authModal');
    showToast("Please login to post a hustle", true);
  } else {
    openModal('postModal');
  }
}

// ===== GIG OWNERSHIP & DASHBOARD =====
async function openDashboard() {
  if (!currentUser) return;
  const gigs = await getGigs();
  const userGigs = gigs.filter(g => g.ownerId === currentUser.id);
  
  const list = document.getElementById('userGigsList');
  if (userGigs.length === 0) {
    list.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 2rem;">You haven't posted any hustles yet.</p>`;
  } else {
    list.innerHTML = userGigs.map(g => `
      <div class="dashboard-item">
        <div>
          <div style="font-weight: 800;">${g.title}</div>
          <div style="font-size: 0.8rem; color: var(--text-muted);">Status: ${g.status || 'Active'}</div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
          <label class="switch">
            <input type="checkbox" ${g.status === 'Completed' ? 'checked' : ''} onchange="toggleStatus('${g.id}', this.checked)">
            <span class="slider"></span>
          </label>
          <button onclick="confirmDelete('${g.id}')" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem;">✕</button>
        </div>
      </div>
    `).join('');
  }
  openModal('dashboardModal');
}

async function toggleStatus(id, isFinished) {
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  if (g && g.ownerId === currentUser.id) {
    g.status = isFinished ? 'Pending Confirmation' : 'Active';
    saveAllGigs(gigs);
    renderGigs();
    showToast(`Hustle marked as ${isFinished ? 'Finished (Waiting for User confirmation)' : 'Active'}`);
  }
}

async function confirmUserFinish(id) {
  if (!currentUser) return openModal('authModal');
  
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  if (g) {
    g.status = 'Archived';
    saveAllGigs(gigs);
    renderGigs();
    showToast("🎉 Job confirmed! It has been removed from the board.");
  }
}

async function confirmDelete(id) {
  if (confirm("Are you sure you want to remove this hustle? This cannot be undone.")) {
    await deleteGig(id);
    openDashboard(); // Refresh dashboard
  }
}

async function deleteGig(id) {
  const gigs = await getGigs();
  const filtered = gigs.filter(g => g.id != id);
  saveAllGigs(filtered);
  renderGigs();
  showToast("Hustle removed successfully! ✓");
}

function saveAllGigs(gigs) {
  // Sync back to whatever storage is active
  localStorage.setItem(STORAGE_KEY, JSON.stringify(gigs));
  // In a real app, this would be a PUT/PATCH request to the API
}

// ===== DATA LAYER (UPGRADED) =====
async function getGigs() {
  try {
    const res = await fetch(`${API_URL}/gigs`);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }
}

async function renderGigs() {
  const gigs = await getGigs();
  const grid = document.getElementById('gigGrid');
  
  gigs.sort((a,b) => (b.isFeatured - a.isFeatured) || (b.createdAt - a.createdAt));

  // Filter out archived (Double Confirmed) gigs
  const activeGigs = gigs.filter(g => g.status !== 'Archived');

  grid.innerHTML = activeGigs.map(g => {
    const isOwner = currentUser && g.ownerId === currentUser.id;
    const isPendingConfirmation = g.status === 'Pending Confirmation';
    
    return `
      <div class="gig-card ${g.isFeatured ? 'featured-glow' : ''}">
        ${isOwner ? `<button class="btn-delete" onclick="confirmDelete('${g.id}')">✕</button>` : ''}
        
        <div style="display: flex; gap: 8px;">
          <div class="card-type-tag ${g.type === 'offer' ? 'type-offer' : 'type-request'}">
            ${g.type === 'offer' ? 'Service Offered' : 'Help Wanted'}
          </div>
          ${isPendingConfirmation ? '<span class="status-badge status-pending-confirmation">Waiting for confirmation... ⏳</span>' : ''}
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h3 class="card-title">${g.title} ${g.isVerified ? '🛡️' : ''}</h3>
          <span class="card-price ${g.type === 'request' ? 'request-price' : ''}">R${g.price}</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">${g.description}</p>
        <div style="display: flex; gap: 8px; margin: 10px 0;">
          ${g.isFeatured ? '<span class="badge badge-featured">FEATURED</span>' : ''}
          ${g.isVerified ? '<span class="badge badge-verified">Verified</span>' : ''}
        </div>

        ${(isPendingConfirmation && !isOwner) ? `
          <button class="btn-confirm-finish" onclick="confirmUserFinish('${g.id}')">
            ✅ Confirm this job is done
          </button>
        ` : ''}

        <div style="display: flex; gap: 10px; margin-top: auto;">
          <button class="btn-wa" onclick="openAi('${g.id}')">Contact</button>
          ${isOwner ? `<button class="btn-post" onclick="openDashboard()" style="padding: 8px 12px; font-size: 0.8rem; background: var(--surface); color: var(--text);">Manage</button>` : `<button class="btn-post" onclick="openModal('payModal')" style="padding: 8px 12px; font-size: 0.8rem;">Boost</button>`}
        </div>
      </div>
    `;
  }).join('');
}

async function handlePost(e) {
  e.preventDefault();
  if (!currentUser) return openModal('authModal');

  const gig = {
    id: Date.now(),
    ownerId: currentUser.id,
    title: document.getElementById('postTitle').value,
    type: document.getElementById('postType').value,
    price: document.getElementById('postPrice').value,
    whatsapp: document.getElementById('postWhatsapp').value,
    description: document.getElementById('postDesc').value,
    status: 'Active',
    createdAt: Date.now()
  };
  
  try {
    const res = await fetch(`${API_URL}/gigs`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(gig)
    });
    if (!res.ok) throw new Error();
  } catch {
    const local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    local.unshift(gig);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(local));
  }
  
  closeModal('postModal');
  renderGigs();
  showToast("Hustle posted! 🎉");
}

// ===== REST OF JS (UNCHANGED BUT RE-INITED) =====
async function openAi(id) {
  const gigs = await getGigs();
  const g = gigs.find(x => x.id == id);
  if(!g) return;
  const pitch = g.type === 'offer' 
    ? `Hi! I saw your service "${g.title}" on HustleBoard and I'm interested.`
    : `Hi! I saw your request for "${g.title}" and I'd love to help.`;
    
  document.getElementById('aiPitch').textContent = pitch;
  document.getElementById('sendAiBtn').onclick = () => {
    window.open(`https://wa.me/${g.whatsapp}?text=${encodeURIComponent(pitch)}`);
  };
  openModal('aiModal');
}

function simulatePayment() {
  showToast("Processing...");
  setTimeout(() => {
    showToast("Success! Post boosted. 🎉");
    closeModal('payModal');
  }, 1500);
}

function showToast(m, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.style.background = isError ? 'var(--danger)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

updateNavbar();
renderGigs();
</script>
</body>
</html>
